##############################################
#  Web server  #
##############################################
server.port=${API_APPLICATION_PORT:8082}
server.servlet.context-path=${API_CONTEXT_PATH:/api}
cors.allowed-origins=${API_ALLOWED_ORIGINS:http://localhost:4202}


#########################
#  Database connection  #
#########################
spring.datasource.hikari.connectionTimeout=30000
spring.datasource.hikari.maximumPoolSize=${HIKARI_MAX_POOL_SIZE:20}
