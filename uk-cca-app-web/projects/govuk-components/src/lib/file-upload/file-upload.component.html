<label [for]="identifier" class="govuk-label" [class.govuk-visually-hidden]="isLabelHidden()">
  {{ currentLabel() }}
</label>

@if (control.touched && control.invalid) {
  <govuk-error-message [errors]="control.errors" [identifier]="identifier" />
}

<input
  (blur)="onBlur()"
  (change)="onChange($event)"
  [accept]="accepted()"
  [class.govuk-file-upload--error]="control.invalid && control.touched"
  [disabled]="control.disabled"
  [id]="identifier"
  [multiple]="isMultiple()"
  [name]="identifier"
  class="govuk-file-upload"
  type="file"
/>
