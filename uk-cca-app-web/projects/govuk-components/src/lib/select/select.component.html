<label [class.govuk-visually-hidden]="isLabelHidden()" [for]="identifier" [id]="'l.' + identifier" class="govuk-label">
  {{ currentLabel() }}
</label>

@if (shouldDisplayErrors) {
  <govuk-error-message [errors]="control.errors" [identifier]="identifier" />
}

<select
  [formControl]="control"
  [id]="identifier"
  [attr.name]="identifier"
  [ngClass]="widthClass()"
  class="govuk-select"
  [class.govuk-select--error]="shouldDisplayErrors"
  govukFormError
>
  @for (option of options(); track option) {
    <option [attr.disabled]="option.disabled || null" [ngValue]="option.value">
      {{ option.text }}
    </option>
  }
  <ng-content />
</select>
