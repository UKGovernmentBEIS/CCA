openapi: 3.0.1
info:
  title: API Documentation
  description: API Documentation
  version: uk-cca-app-api 0.0.1
servers:
  - url: http://localhost:8082/api
    description: Generated server url
security:
  - bearerAuth: []
paths:
  /v1.0/verification-bodies:
    get:
      tags:
        - Verification Bodies
      summary: Retrieves all verification bodies
      operationId: getVerificationBodies
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationBodyInfoResponseDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Verification Bodies
      summary: Update the verification body
      operationId: updateVerificationBody
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerificationBodyUpdateDTO'
        required: true
      responses:
        '200':
          description: OK
        '400':
          description: "Bad Request\t\n Error Code | Description \t\nFORM1001 | Form validation failed \t\n VERBODY1001 | Accreditation reference number already exists "
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Verification Bodies
      summary: Creates a verification body
      operationId: createVerificationBody
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerificationBodyCreationDTO'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationBodyInfoDTO'
        '400':
          description: "Bad Request\t\n Error Code | Description \t\nFORM1001 | Form validation failed \t\n USER1001 | User role already exists \t\n AUTHORITY1005 | User status cannot be updated "
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags:
        - Verification Bodies
      summary: Update the verification bodies status
      operationId: updateVerificationBodiesStatus
      requestBody:
        content:
          application/json:
            schema:
              type: array
              description: The verification bodies status dto to update
              items:
                $ref: '#/components/schemas/VerificationBodyUpdateStatusDTO'
        required: true
      responses:
        '200':
          description: OK
        '400':
          description: "Bad Request\t\n Error Code | Description \t\nFORM1001 | Form validation failed \t\n VERBODY1002 | Verification body status is not valid"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
