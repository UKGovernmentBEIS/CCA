  /v1.0/vb-site-contacts:
    get:
      tags:
        - VB site contacts
      summary: >-
        Retrieves the accounts and verification body site contact of the
        accounts
      operationId: getVbSiteContacts
      parameters:
        - name: page
          in: query
          description: The page number starting from zero
          required: true
          schema:
            minimum: 0
            type: integer
            format: int32
        - name: size
          in: query
          description: The page size
          required: true
          schema:
            minimum: 1
            type: integer
            format: int32
      responses:
        '200':
          description: OK
          content:
