@if (vm(); as vm) {
  <div class="govuk-grid-row">
    <div class="govuk-grid-column-full">
      <netz-page-heading size="l">{{ vm.header }}</netz-page-heading>
      <p class="govuk-caption-m govuk-!-margin-bottom-8">{{ vm.requestAction.creationDate | govukDate: 'datetime' }}</p>

      @if (vm.component; as component) {
        <ng-container *ngComponentOutlet="component" />
      } @else if (vm.sections; as sections) {
        <netz-task-list [sections]="sections" />
      }
    </div>
  </div>
}
