@if (!isPasswordReset) {
  @if (isSummaryDisplayed$ | async) {
    <govuk-error-summary [form]="form"></govuk-error-summary>
  }
  <cca-wizard-step
    (formSubmit)="onSubmit()"
    [formGroup]="form"
    submitText="Submit"
    heading="Enter the code shown in the authenticator app"
  >
    <div
      formControlName="otp"
      govuk-text-input
      label="Enter the 6-digit code"
      widthClass="govuk-!-width-one-third"
    ></div>
  </cca-wizard-step>
} @else {
  <div class="govuk-grid-row">
    <div class="govuk-grid-column-two-thirds">
      <div class="govuk-panel govuk-panel--confirmation">
        <div class="govuk-panel__body">You have successfully reset your password</div>
      </div>
      <p class="govuk-body">We have sent a confirmation email to {{ email$ | async }}</p>
      <h2 class="govuk-heading-m">What happens next</h2>
      <p class="govuk-body">
        You can
        <a govukLink [routerLink]="[]" (click)="onSignInAgain()">sign in to the CCA service</a>
        with your new password.
      </p>
      <cca-back-to-top></cca-back-to-top>
    </div>
  </div>
}
