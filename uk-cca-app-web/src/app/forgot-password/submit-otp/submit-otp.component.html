@if (!isPasswordReset) {
  @if (isSummaryDisplayed()) {
    <govuk-error-summary [form]="form" />
  }

  <cca-wizard-step
    (formSubmit)="onSubmit()"
    [formGroup]="form"
    submitText="Submit"
    heading="Enter the code shown in the authenticator app"
  >
    <div
      formControlName="otp"
      govuk-text-input
      label="Enter the 6-digit code"
      widthClass="govuk-!-width-one-third"
    ></div>
  </cca-wizard-step>
} @else {
  <div class="govuk-grid-row">
    <div class="govuk-grid-column-two-thirds">
      <div class="govuk-panel govuk-panel--confirmation">
        <div class="govuk-panel__body">You have successfully reset your password</div>
      </div>

      <p>We have sent a confirmation email to {{ email }}</p>
      <h2 class="govuk-heading-m">What happens next</h2>
      <p>
        You can
        <a class="govuk-link" [routerLink]="[]" (click)="onSignInAgain()">sign in to the CCA service</a>
        with your new password.
      </p>

      <cca-back-to-top />
    </div>
  </div>
}
