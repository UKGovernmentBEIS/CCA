@if (details) {
  <div class="govuk-grid-row">
    <div class="govuk-grid-column-full">
      <netz-page-heading size="xl" data-testid="page-heading" class="govuk-tag-heading-align">
        {{ details?.workflowDetails.id }}

        <span>
          <govuk-tag [color]="details?.workflowDetails.requestStatus | statusColor" class="tag-width">
            {{ details?.workflowDetails.requestStatus | status }}
          </govuk-tag>
        </span>
      </netz-page-heading>
    </div>
  </div>

  <div class="govuk-grid-row">
    <govuk-tabs>
      <ng-template govukTabLazy id="timeline-events" label="Timeline">
        <div class="govuk-grid-row">
          <netz-timeline class="govuk-grid-column-full">
            @for (action of details?.requestActions; track action.id) {
              <netz-timeline-item
                [action]="action"
                [link]="action | timelineItemLink: true"
                [state]="navigationState"
                data-testid="timeline-item"
              />
            } @empty {
              <p data-testid="no-timeline-events">No timeline events</p>
            }
          </netz-timeline>
        </div>
      </ng-template>

      @if (userIsRegulator()) {
        <ng-template govukTabLazy id="notes" label="Notes">
          <cca-workflow-notes />
        </ng-template>
      }
    </govuk-tabs>
  </div>
}
