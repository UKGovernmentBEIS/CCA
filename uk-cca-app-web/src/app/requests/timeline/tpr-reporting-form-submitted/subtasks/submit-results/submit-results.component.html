<netz-page-heading>TPR calculated results</netz-page-heading>

<div class="govuk-!-width-three-quarters">
  <cca-summary [data]="comparisonData()" />

  @if (!isInterimReport()) {
    <h3 class="govuk-heading-m">Results details</h3>
    <p class="govuk-hint">
      The values reflected below are based on the baseline data and input values at the time when this report is
      submitted only. Any subsequent variations and/or corrections may change these values when the buy-out run is
      executed.
    </p>

    <cca-summary [data]="resultsDetails()" />
  }
</div>

<div class="govuk-!-width-three-quarters">
  <govuk-details summary="View baseline details">
    <cca-summary [data]="baselineDetails()" />
  </govuk-details>
</div>
