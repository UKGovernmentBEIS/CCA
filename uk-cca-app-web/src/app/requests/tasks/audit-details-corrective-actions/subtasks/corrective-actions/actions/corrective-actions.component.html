<div class="govuk-!-width-two-thirds">
  <cca-wizard-step
    (formSubmit)="onSubmit()"
    [formGroup]="form"
    heading="Add corrective actions"
    caption="Corrective actions"
    data-testid="corrective-actions-form"
  >
    <p>
      Enter details of up to 10 corrective actions and completion dates exactly as they appear in the final audit report
      you sent to the operator
    </p>

    <ng-container formArrayName="correctiveActions">
      @for (action of correctiveActions.controls; let i = $index; track action) {
        <div [formGroupName]="i">
          <cca-action-item
            [group]="action"
            [index]="i"
            [canRemove]="correctiveActions.length > 1"
            (remove)="onRemoveAction(i)"
          />
        </div>
      }
    </ng-container>

    @if (correctiveActions.length < 10) {
      <div class="govuk-grid-row">
        <div class="govuk-grid-column-full">
          <button
            type="button"
            class="govuk-button govuk-button--secondary govuk-!-margin-bottom-5"
            (click)="onAddAction()"
          >
            Add another corrective action
          </button>
        </div>
      </div>
    }
  </cca-wizard-step>

  <hr class="govuk-footer__section-break govuk-!-margin-bottom-3" />
  <netz-return-to-task-or-action-page />
</div>
