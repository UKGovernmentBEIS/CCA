<div class="govuk-!-width-two-thirds">
  <cca-wizard-step
    (formSubmit)="onSubmit()"
    [formGroup]="form"
    heading="Details of the audit"
    caption="Audit details"
    data-testid="audit-details-form"
  >
    <p class="govuk-label govuk-label--m">Audit technique</p>
    <div class="govuk-!-margin-bottom-9" formControlName="auditTechnique" govuk-radio [isInline]="true">
      <govuk-radio-option [value]="'DESK_BASED_INTERVIEW'" [label]="'Desk-based audit'" />
      <govuk-radio-option [value]="'ON_SITE_VISIT'" [label]="'On-site visit'" />
    </div>

    <div
      formControlName="auditDate"
      govuk-date-input
      label="When did the audit take place?"
      size="normal"
      [max]="today"
      hint="Enter the date of the audit"
      class="govuk-!-margin-bottom-9 govuk-!-margin-top-9"
    ></div>

    <div
      govuk-textarea
      label="Comments"
      labelSize="medium"
      hint="Summarise the key outcomes from the audit and the actions you took.  (Please note that operator users will be able to see these comments.)"
      formControlName="comments"
    ></div>

    <div
      formControlName="finalAuditReportDate"
      govuk-date-input
      label="When did you send the final audit report to the operator?"
      size="normal"
      class="govuk-!-margin-bottom-9 govuk-!-margin-top-9"
      [max]="today"
    ></div>

    <p class="govuk-label govuk-label--m">Audit documents</p>
    <span class="govuk-hint"> Upload the final audit report you sent to the operator</span>
    <cca-multiple-file-input [baseDownloadUrl]="downloadUrl" formControlName="auditDocuments" label=" " hint=" " />
  </cca-wizard-step>

  <hr class="govuk-footer__section-break govuk-!-margin-bottom-3" />
  <netz-return-to-task-or-action-page />
</div>
