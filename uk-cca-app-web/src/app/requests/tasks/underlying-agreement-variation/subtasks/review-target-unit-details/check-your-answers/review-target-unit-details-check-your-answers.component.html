<div>
  <netz-page-heading caption="Change">Check your answers</netz-page-heading>

  <ng-template #contentTpl let-showOriginal="showOriginal">
    <cca-summary [data]="showOriginal ? summaryDataOriginal : summaryDataCurrent" />
  </ng-template>

  <cca-highlight-diff>
    <ng-container slot="previous" *ngTemplateOutlet="contentTpl; context: { showOriginal: true }"></ng-container>
    <ng-container slot="current" *ngTemplateOutlet="contentTpl; context: { showOriginal: false }"></ng-container>
  </cca-highlight-diff>

  <button netzPendingButton govukButton type="button" (click)="onSubmit()">Confirm and complete</button>
</div>

<netz-return-to-task-or-action-page></netz-return-to-task-or-action-page>
