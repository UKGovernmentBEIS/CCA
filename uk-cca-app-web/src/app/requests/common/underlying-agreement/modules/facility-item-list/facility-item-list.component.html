<govuk-table [columns]="tableColumns" [data]="sortedFacilityItems()" (sort)="sorting.set($event)">
  <ng-template let-column="column" let-row="row">
    @switch (column.field) {
      @case ('status') {
        {{ row[column.field] | facilityStatus }}
      }

      @case ('links') {
        @if (isEditable()) {
          <div class="govuk-!-text-align-right">
            <a class="govuk-link" [routerLink]="['../', row.facilityId, 'edit']">Edit</a>

            @switch (row[statusColumn]) {
              @case ('NEW') {
                <a class="govuk-!-padding-left-3" class="govuk-link" [routerLink]="['../', row.facilityId, 'delete']">
                  Delete
                </a>
              }

              @case ('LIVE') {
                <a class="govuk-!-padding-left-3" class="govuk-link" [routerLink]="['../', row.facilityId, 'exclude']">
                  Exclude
                </a>
              }

              @case ('EXCLUDED') {
                <a class="govuk-!-padding-left-3" class="govuk-link" [routerLink]="['../', row.facilityId, 'undo']">
                  Undo
                </a>
              }
            }
          </div>
        }
      }

      @default {
        {{ row[column.field] }}
      }
    }
  </ng-template>
</govuk-table>
