@if (details) {
  <div class="govuk-grid-row">
    <div class="govuk-grid-column-full">
      <netz-page-heading size="xl" [caption]="details?.workflowDetails.id" data-testid="page-heading">
        Subsistence fees
        <govuk-tag class="float-right" [color]="details?.workflowDetails.requestStatus | requestStatusTagColor">
          {{ details?.workflowDetails.requestStatus | workflowStatus }}
        </govuk-tag>
      </netz-page-heading>
    </div>

    <govuk-tabs>
      <ng-template govukTabLazy id="timeline-events" label="Timeline">
        <div class="govuk-grid-row">
          <netz-timeline class="govuk-grid-column-full">
            @for (action of details?.requestActions; track action.id) {
              <netz-timeline-item
                [action]="action"
                [link]="action | timelineItemLink: true"
                [state]="navigationState"
                data-testid="timeline-item"
              >
              </netz-timeline-item>
            } @empty {
              <p class="govuk-body" data-testid="no-timeline-events">No timeline events</p>
            }
          </netz-timeline>
        </div>
      </ng-template>

      <ng-template govukTabLazy id="notes" label="Notes">
        <!-- Add Notes content here -->
      </ng-template>
    </govuk-tabs>
  </div>
}
