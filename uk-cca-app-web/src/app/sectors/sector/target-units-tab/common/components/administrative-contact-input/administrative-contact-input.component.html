<div
  formControlName="email"
  govuk-text-input
  label="Email address"
  labelSize="small"
  widthClass="govuk-!-width-one-half"
  hint="All system alerts, notices and official communications will always be sent by email"
></div>

<div
  formControlName="firstName"
  govuk-text-input
  label="First name"
  labelSize="small"
  widthClass="govuk-!-width-one-half"
></div>

<div
  formControlName="lastName"
  govuk-text-input
  label="Last name"
  labelSize="small"
  widthClass="govuk-!-width-one-half"
></div>

<div
  formControlName="jobTitle"
  govuk-text-input
  label="Job title (optional)"
  labelSize="small"
  widthClass="govuk-!-width-one-half"
></div>

<div cca-phone-input formControlName="phoneNumber" label="Phone number"></div>

<h2 class="govuk-heading-m">Administrative contact address</h2>

@if (sameAddressExists()) {
  <div formControlName="sameAddress" govuk-checkboxes>
    <govuk-checkbox
      [value]="true"
      label="The administrative contact address is the same as the responsible person address"
    ></govuk-checkbox>
  </div>
}

<div formGroupName="address">
  <cca-account-address-input></cca-account-address-input>
</div>
