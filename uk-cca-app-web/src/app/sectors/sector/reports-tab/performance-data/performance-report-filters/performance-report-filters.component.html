<cca-utility-panel heading="Filters">
  <form [formGroup]="filtersForm" (ngSubmit)="apply()">
    <div class="govuk-grid-row">
      <div class="govuk-grid-column-one-half">
        <div
          govuk-text-input
          widthClass="govuk-!-width-full"
          label="TU ID"
          labelSize="small"
          formControlName="targetUnitAccountBusinessId"
        ></div>
      </div>

      <div class="govuk-grid-column-one-quarter">
        <div
          govuk-select
          widthClass="govuk-!-width-full"
          [options]="performanceOutcomeOptions"
          label="Status"
          formControlName="performanceOutcome"
        ></div>
      </div>

      <div class="govuk-grid-column-one-quarter">
        <div
          govuk-select
          widthClass="govuk-!-width-full"
          label="Subtype"
          [options]="submissionTypeOptions"
          formControlName="submissionType"
        ></div>
      </div>
    </div>

    <div class="govuk-grid-row">
      <div class="govuk-grid-column-one-quarter">
        <button class="govuk-!-margin-right-3" govukButton type="submit">Apply</button>
        <button govukSecondaryButton type="button" (click)="clear()">Clear</button>
      </div>
    </div>
  </form>
</cca-utility-panel>
