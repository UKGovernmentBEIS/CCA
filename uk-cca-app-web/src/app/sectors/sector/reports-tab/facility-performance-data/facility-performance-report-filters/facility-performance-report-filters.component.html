<cca-utility-panel heading="Filters">
  <form [formGroup]="filtersForm" (ngSubmit)="apply()">
    <div class="govuk-grid-row">
      <div class="govuk-grid-column-one-half">
        <div
          govuk-text-input
          widthClass="govuk-!-width-full"
          label="Facility ID or TU ID"
          labelSize="small"
          formControlName="facilityOrTargetUnitAccountBusinessId"
        ></div>
      </div>

      <div class="govuk-grid-column-one-quarter">
        <div
          govuk-select
          widthClass="govuk-!-width-full"
          [options]="reportStatusOptions()"
          label="Status"
          formControlName="reportStatus"
        ></div>
      </div>

      @if (showSubTypeFilter()) {
        <div class="govuk-grid-column-one-quarter">
          <div
            govuk-select
            widthClass="govuk-!-width-full"
            label="Subtype"
            [options]="subTypeOptions"
            formControlName="subType"
          ></div>
        </div>
      }
    </div>

    <div class="govuk-grid-row">
      <div class="govuk-grid-column-one-quarter">
        <button class="govuk-!-margin-right-3" govukButton type="submit">Apply</button>
        <button govukSecondaryButton type="button" (click)="clear()">Clear</button>
      </div>
    </div>
  </form>
</cca-utility-panel>
