@if (isErrorSummaryDisplayed()) {
  <govuk-error-summary [form]="form" />
}

<netz-page-heading size="xl">Enter a query</netz-page-heading>

<p>
  To see all SQL queries needed to execute the relevant MI reports,
  <a
    class="govuk-link"
    href="https://beisgov.sharepoint.com/:f:/r/sites/UKETSDelShare/Shared%20Documents/CCA%20Register/MI%20Reports"
    target="_blank"
    rel="noreferrer noopener"
  >
    access the SQL query list.
  </a>
</p>

<form (ngSubmit)="exportToExcel()" [formGroup]="form">
  <div govuk-textarea formControlName="query" label="Enter a query"></div>

  <div class="govuk-button-group">
    <button netzPendingButton govukButton type="submit">Export to excel</button>
  </div>
</form>
