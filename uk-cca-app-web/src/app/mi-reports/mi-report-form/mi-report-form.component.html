@if (isErrorSummaryDisplayed()) {
  <govuk-error-summary [form]="form" />
}

<netz-page-heading [caption]="isEditMode ? 'Change' : null" size="xl">
  {{ isEditMode ? 'MI Report details' : 'New MI Report' }}
</netz-page-heading>

<form [formGroup]="form" (ngSubmit)="onSubmit()">
  <div class="govuk-grid-row">
    <div class="govuk-grid-column-two-thirds">
      <div cca-text-input formControlName="reportName" label="Report name"></div>
    </div>
  </div>

  <div class="govuk-grid-row">
    <div class="govuk-grid-column-three-quarters">
      <div govuk-textarea formControlName="description" label="Description (optional)"></div>
    </div>
  </div>

  <div class="govuk-grid-row">
    <div class="govuk-grid-column-three-quarters">
      <div govuk-textarea formControlName="queryDefinition" label="Query"></div>
    </div>
  </div>

  <p class="govuk-label">Preview query</p>
  <p class="govuk-hint govuk-!-margin-top-0">
    Click the button below to make sure your query works as expected before saving it.
  </p>

  <div class="govuk-button-group govuk-!-margin-top-5">
    <button govukSecondaryButton type="button" (click)="exportToExcel()">Export to Excel</button>
  </div>

  <div class="govuk-button-group govuk-!-margin-top-9">
    <button netzPendingButton govukButton type="submit">Save and confirm</button>
  </div>

  <a [routerLink]="isEditMode ? '../..' : '..'" class="govuk-link">Return to: MI Reports</a>
</form>
