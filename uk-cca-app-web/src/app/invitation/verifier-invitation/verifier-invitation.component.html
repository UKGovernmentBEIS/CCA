<div class="govuk-grid-row">
  <div class="govuk-grid-column-one-half">
    @if (isSummaryDisplayed | async) {
      <govuk-error-summary [form]="form"></govuk-error-summary>
    }
    <cca-page-heading>Activate your account</cca-page-heading>
    <form (ngSubmit)="submitPassword()" [formGroup]="form">
      <cca-password></cca-password>
      <button ccaPendingButton govukButton type="submit">Submit</button>
    </form>
  </div>
</div>
