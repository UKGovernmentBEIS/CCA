@if (isErrorSummaryDisplayed()) {
  <govuk-error-summary [form]="form"></govuk-error-summary>
}

<netz-page-heading [caption]="'Create user account'">Enter your details</netz-page-heading>

<div class="govuk-body">
  <form
    (ngSubmit)="onSubmitSectorUserInvitationDetails()"
    [formGroup]="form"
    data-testid="invited-sector-user-details-form"
  >
    <div class="govuk-!-width-one-half govuk-!-margin-bottom-9">
      <h2 class="govuk-heading-m">Your name</h2>

      <div formControlName="firstName" govuk-text-input label="First name" labelSize="small"></div>

      <div formControlName="lastName" govuk-text-input label="Last name" labelSize="small"></div>

      <div formControlName="jobTitle" govuk-text-input label="Job title (optional)" labelSize="small"></div>

      <div
        formControlName="email"
        govuk-text-input
        label="Email address"
        labelSize="small"
        hint="All system alerts, notices and official communications will always be sent by email"
      ></div>
    </div>

    <div class="govuk-!-width-one-half">
      <h2 class="govuk-heading-m">Your organisation details</h2>

      <div formControlName="contactType" govuk-radio legend="Contact type" [isInline]="true">
        @for (option of contactTypeOptions; track option.value) {
          <govuk-radio-option [label]="option.text" [value]="option.value" isDisabled="true"></govuk-radio-option>
        }
      </div>

      <div
        formControlName="organisationName"
        govuk-text-input
        label="Organisation name (optional)"
        labelSize="small"
      ></div>

      <h3 class="govuk-heading-s govuk-!-margin-bottom-0">Phone number (optional)</h3>
      <p class="govuk-!-margin-top-0">For international numbers include the country code</p>
    </div>

    <div cca-phone-input formControlName="phoneNumber" label="Phone number 1"></div>

    <div
      cca-phone-input
      formControlName="mobileNumber"
      label="Phone number 2 (optional)"
      widthClass="govuk-!-width-one-third"
    ></div>

    <button netzPendingButton govukButton type="submit">Continue</button>
  </form>
</div>
